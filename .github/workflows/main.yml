name: Trigger Kaggle Notebook

on:
  schedule:
    - cron: '0 */9 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Kaggle Notebook
        run: |
          pip install kaggle
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.KAGGLE_KEY }}" \
            -H "Content-Type: application/json" \
            https://www.kaggle.com/api/v1/kernels/${{ secrets.KAGGLE_USERNAME }}/leads-hunter/run
