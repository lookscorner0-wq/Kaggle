name: 8-Hour Lead Generation Cycle

on:
  schedule:
    # Runs every 8 hours (00:00, 08:00, 16:00 UTC)
    - cron: '0 */8 * * *'
  workflow_dispatch:
    # Allows you to start the agent manually anytime with a button
    inputs:
      reason:
        description: 'Reason for manual start'
        required: false
        default: 'Manual Test'

jobs:
  run-lead-agent:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🐍 Setup Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 🚀 Execute Lead Agent
        env:
          # Mapping GitHub Secrets to Script Environment Variables
          SCRIPT_URL: ${{ secrets.SCRIPT_URL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: python updated_lead_agent.py

      - name: 😴 Session Complete
        run: echo "Agent finished its 8-hour cycle. Waiting for next cron trigger."
